<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const path = window.location.pathname
        .replace('/macro-fuel', '')
        .replace(/\/$/, '');
      window.location.replace(
        '/macro-fuel/?r=' + encodeURIComponent(path || '/')
      );
    </script>
  </head>
</html>
